name: help_to_cook
description: "A new Flutter project."
publish_to: 'none'
version: 0.9.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.18.1
  collection: ^1.18.0
  animations: ^2.0.8
  google_fonts: ^6.1.0
  uuid: ^4.2.0
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_image_labeling: ^0.13.0
  file_picker: ^8.1.2
  package_info_plus: ^8.0.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/recipes/
    - assets/images/
    - assets/pantry/
    - assets/products/
    - google_fonts/
